<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Assay{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js" defer></script>
  <script src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js" defer></script>
</head>
<body>
  <nav>
    <a href="/" class="brand">Assay</a>
    <span class="spacer"></span>
    {% if identity and identity != 'anonymous' %}
      <span class="nav-user">{{ identity }}</span>
      <a href="/logout">Log out</a>
    {% else %}
      <a href="/login">Log in</a>
    {% endif %}
    {% block nav %}{% endblock %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
