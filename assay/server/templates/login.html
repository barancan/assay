{% extends "base.html" %}
{% block title %}Log in — Assay{% endblock %}

{% block content %}
<div class="login-card">
  <h1>Sign in</h1>
  <form method="post" action="/login">
    {% if users %}
    <label>
      Username
      <select name="username">
        {% for u in users %}
        <option value="{{ u.name }}">{{ u.name }} ({{ u.role }})</option>
        {% endfor %}
      </select>
    </label>
    {% else %}
    <label>
      Username <small style="color:#888">(solo-dev mode — no accounts configured)</small>
      <input type="text" name="username" required placeholder="any name">
    </label>
    {% endif %}
    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
