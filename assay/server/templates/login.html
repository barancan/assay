{% extends "base.html" %}
{% block title %}Sign in — Assay{% endblock %}

{% block content %}
<div class="login-card">
  <h1>Sign in</h1>
  <form method="post" action="/login">
    {% if users %}
    <label>
      Username
      <select name="username" style="display:block;width:100%;margin-top:.3rem">
        {% for u in users %}
        <option value="{{ u.name }}">{{ u.name }} ({{ u.role }})</option>
        {% endfor %}
      </select>
    </label>
    {% else %}
    <label>
      Username
      <small style="color:var(--text-muted)">(solo-dev mode — no accounts configured)</small>
      <input type="text" name="username" required placeholder="any name" style="display:block;width:100%;margin-top:.3rem">
    </label>
    {% endif %}
    <button type="submit" class="btn btn-primary">
      <i class="ti ti-user" aria-hidden="true"></i> Sign in
    </button>
  </form>
</div>
{% endblock %}
