<div style="margin-bottom:.75rem">
  <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Adapter</label>
  <select x-model="adapter" style="width:100%;max-width:18rem">
    <option value="mock">mock (offline, no keys)</option>
    <option value="anthropic">anthropic</option>
    <option value="openai_compat">OpenAI-compatible</option>
    <option value="ollama">ollama (local)</option>
    <option value="rest">REST / HTTP</option>
  </select>
</div>

<!-- mock: no fields needed -->
<div id="adapter-mock-fields" x-show="adapter === 'mock'">
  <p style="font-size:13px;color:var(--text-muted)">
    <i class="ti ti-info-circle" aria-hidden="true"></i>
    Mock adapter runs offline with no API keys required.
  </p>
</div>

<!-- anthropic -->
<div x-show="adapter === 'anthropic'">
  <div style="display:grid;gap:.5rem;grid-template-columns:1fr 1fr;margin-top:.5rem">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Model</label>
      <input x-model="model" type="text" placeholder="claude-opus-4-8" style="width:100%">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">API key env var</label>
      <input x-model="key_env" type="text" placeholder="ANTHROPIC_API_KEY" style="width:100%">
    </div>
  </div>
</div>

<!-- openai_compat -->
<div x-show="adapter === 'openai_compat'">
  <div style="display:grid;gap:.5rem;grid-template-columns:1fr 1fr;margin-top:.5rem">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Base URL</label>
      <input x-model="endpoint" type="text" placeholder="https://api.openai.com/v1" style="width:100%">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Model</label>
      <input x-model="model" type="text" placeholder="gpt-4o" style="width:100%">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">API key env var</label>
      <input x-model="key_env" type="text" placeholder="OPENAI_API_KEY" style="width:100%">
    </div>
  </div>
</div>

<!-- ollama -->
<div x-show="adapter === 'ollama'">
  <div style="display:grid;gap:.5rem;grid-template-columns:1fr 1fr;margin-top:.5rem">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Base URL</label>
      <input x-model="endpoint" type="text" placeholder="http://localhost:11434" style="width:100%">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Model</label>
      <input x-model="model" type="text" placeholder="llama3" style="width:100%">
    </div>
  </div>
</div>

<!-- rest -->
<div x-show="adapter === 'rest'">
  <div style="display:grid;gap:.5rem;grid-template-columns:1fr 1fr;margin-top:.5rem">
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Base URL</label>
      <input x-model="endpoint" type="text" placeholder="https://api.example.com" style="width:100%">
    </div>
    <div>
      <label style="display:block;font-size:13px;font-weight:500;margin-bottom:.3rem">Auth env var</label>
      <input x-model="key_env" type="text" placeholder="MY_API_KEY" style="width:100%">
    </div>
  </div>
</div>
