services:
  assay:
    build: .
    ports: ["8000:8000"]
    environment:
      # Required: Postgres connection string.
      ASSAY_DB_URL: postgresql+psycopg://assay:assay@db:5432/assay
      # Enforced auth mode: reject forged cookies and unseeded approvers.
      ASSAY_AUTH: enforced
      # Required in enforced mode: generate with:
      #   python -c "import secrets; print(secrets.token_urlsafe(32))"
      # then export ASSAY_SECRET_KEY=<value> before running docker compose up.
      ASSAY_SECRET_KEY: "${ASSAY_SECRET_KEY:?Set ASSAY_SECRET_KEY before starting. Generate with: python -c 'import secrets; print(secrets.token_urlsafe(32))'}"
      # Optional: Linear integration — set to enable issue creation.
      # ASSAY_LINEAR_API_KEY: lin_api_...
      # ASSAY_LINEAR_TEAM_ID: ...
      # ASSAY_LINEAR_PROJECT_ID: ...
    volumes:
      - assayhome:/root/.assay
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assay
      POSTGRES_PASSWORD: assay
      POSTGRES_DB: assay
    volumes:
      - assaydb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assay"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  assaydb: {}
  assayhome: {}
